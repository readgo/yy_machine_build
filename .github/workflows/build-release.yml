name: Build Windows Portable & Release

on:
  push:
    tags:
      - 'release-*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (tag) to use for release'
        required: false
        default: ''

env:
  GITEE_REPO: gitee.com/jing1984/yy_machine.git
  GITEE_BRANCH: main

jobs:
  build-and-release:
    name: Build & Release Windows Portable
    runs-on: windows-latest

    steps:
      - name: Clone source from Gitee
        shell: pwsh
        env:
          GITEE_USER: ${{ secrets.GITEE_USERNAME }}
          GITEE_PASS: ${{ secrets.GITEE_TOKEN }}
          GITEE_BRANCH: master
        run: |
          $user = [System.Uri]::EscapeDataString($env:GITEE_USER)
          $pass = [System.Uri]::EscapeDataString($env:GITEE_PASS)
          $url = "https://${user}:${pass}@gitee.com/jing1984/yy_machine.git"
          git clone --branch $env:GITEE_BRANCH $url .

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Compose Desktop distribution
        run: |
          .\gradlew.bat :apps:appPrinter:createDistributable -PbuildEnv=prod --no-daemon

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $appDir = "apps\appPrinter\build\compose\binaries\main\app\YYMachinePrinter"
          Write-Host "=== App directory: $appDir ==="

          # Copy scripts/ to output
          if (Test-Path "scripts") {
            Write-Host "Copying scripts/ ..."
            Copy-Item -Recurse -Force "scripts" "$appDir\scripts"
          } else {
            Write-Host "Warning: scripts/ not found, skipping"
          }

          # Copy app-langs if available (external project, not always present)
          $langSource = "..\app-langs\printer"
          if (Test-Path $langSource) {
            Write-Host "Copying app-langs ..."
            New-Item -ItemType Directory -Force -Path "$appDir\lang" | Out-Null
            Copy-Item -Path "$langSource\*.xml" -Destination "$appDir\lang\" -Force
            if (Test-Path "$langSource\languages.json") {
              Copy-Item -Path "$langSource\languages.json" -Destination "$appDir\lang\languages.json" -Force
            }
            Write-Host "app-langs copied"
          } else {
            Write-Host "Warning: app-langs not found, skipping"
          }

          # Create ZIP with timestamp
          $timestamp = Get-Date -Format 'yyyyMMddHHmmss'
          $zipName = "YYMachinePrinter_$timestamp.zip"
          $zipPath = "$appDir\$zipName"
          Write-Host "Creating ZIP: $zipName"
          Compress-Archive -Path "$appDir\*" -DestinationPath $zipPath -Force

          # Set outputs for later steps
          echo "ZIP_PATH=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "=== ZIP created: $zipPath ==="

      - name: List output contents
        shell: pwsh
        run: |
          Write-Host "=== ZIP file ==="
          Get-Item "$env:ZIP_PATH" | Select-Object Name, Length
          Write-Host "=== Output directory ==="
          Get-ChildItem "apps\appPrinter\build\compose\binaries\main\app\YYMachinePrinter" -Include *.zip | Select-Object Name, Length

      - name: Create GitHub Release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Write-Host "=== Creating release: $tag ==="
          gh release create "$tag" `
            --repo readgo/yy_machine_build `
            --title "YYMachine $tag" `
            --notes "Windows portable release $tag." `
            "$env:ZIP_PATH"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build Summary
        run: |
          Write-Host "=========================================="
          Write-Host "  Build & Release Complete!"
          Write-Host "  Tag: ${{ github.ref_name }}"
          Write-Host "  Asset: $env:ZIP_NAME"
          Write-Host "  Repo: readgo/yy_machine_build"
          Write-Host "=========================================="
        shell: pwsh
